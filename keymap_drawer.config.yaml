draw_config:
  svg_extra_style: |
    g.keypos-13 rect.key, g.keypos-14 rect.key, g.keypos-15 rect.key, g.keypos-16 rect.key,
    g.keypos-19 rect.key, g.keypos-20 rect.key, g.keypos-21 rect.key, g.keypos-22 rect.key {
      fill: #e6f2ff;
      stroke: #5a9fe0;
      stroke-width: 1.5;
    }
    g.layer-L1 g.keypos-11 text.tap,
    g.layer-L1 g.keypos-34 text.tap,
    g.layer-L1 g.keypos-35 text.tap {
      fill: #d7263d;
      font-weight: bold;
    }

